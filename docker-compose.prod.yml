version: "3.9"

# ── Sara agent only — dashboard is on Vercel ──────────────────────────────────
#
# Directory layout expected on the VPS:
#   ~/vextria/
#     Voice-Bot-/          ← agent repo (this file lives here)
#     .env.prod            ← env file with all variables (see .env.prod.example)
#
# Start:   docker compose -f docker-compose.prod.yml --env-file ../.env.prod up -d --build
# Logs:    docker compose -f docker-compose.prod.yml logs -f
# Update:  git pull, then re-run the start command

services:

  # ── Sara voice agent ────────────────────────────────────────────────────────
  sara-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sara-agent
    restart: unless-stopped
    environment:
      LIVEKIT_URL:          ${LIVEKIT_URL}
      LIVEKIT_API_KEY:      ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET:   ${LIVEKIT_API_SECRET}
      DEEPGRAM_API_KEY:     ${DEEPGRAM_API_KEY}
      OPENAI_API_KEY:       ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY:   ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID:  ${ELEVENLABS_VOICE_ID}
      DASHBOARD_URL:        ${DASHBOARD_URL}
      CRM_WEBHOOK_URL:      ${CRM_WEBHOOK_URL:-}
