version: "3.9"

# ── Full production stack — run this on the Hostinger VPS ─────────────────────
#
# Directory layout expected on the VPS:
#   ~/vextria/
#     Voice-Bot-/          ← agent repo (this file lives here)
#     vextriadashboard/    ← dashboard repo (cloned beside it)
#     .env.prod            ← single env file with ALL variables (see .env.prod.example)
#
# Start:   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# Logs:    docker compose -f docker-compose.prod.yml logs -f
# Update:  git pull in each repo, then re-run the start command

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vextria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vextria
      POSTGRES_USER:     vextria
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data   # persists across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vextria"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Dashboard ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../vextriadashboard     # sibling directory on the VPS
      dockerfile: Dockerfile
    container_name: vextria-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"                    # exposed to internet via nginx / directly
    environment:
      NODE_ENV:            production
      DATABASE_URL:        postgresql://vextria:${POSTGRES_PASSWORD}@postgres:5432/vextria
      LIVEKIT_URL:         ${LIVEKIT_URL}
      LIVEKIT_API_KEY:     ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET:  ${LIVEKIT_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Sara voice agent ────────────────────────────────────────────────────────
  sara-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sara-agent
    restart: unless-stopped
    environment:
      LIVEKIT_URL:          ${LIVEKIT_URL}
      LIVEKIT_API_KEY:      ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET:   ${LIVEKIT_API_SECRET}
      DEEPGRAM_API_KEY:     ${DEEPGRAM_API_KEY}
      OPENAI_API_KEY:       ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY:   ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID:  ${ELEVENLABS_VOICE_ID}
      DASHBOARD_URL:        http://dashboard:3000   # internal Docker network
      CRM_WEBHOOK_URL:      ${CRM_WEBHOOK_URL:-}
    depends_on:
      - dashboard

volumes:
  postgres-data:    # named volume — survives `docker compose down`
